<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Muñoz | Apex Predator v1.6.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        input, .search-results { background-color: #0f172a !important; border: 1px solid #475569 !important; }
        .btn-primary { background-color: #0284c7; transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background-color: #0ea5e9; }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .op-btn.active { background-color: #0ea5e9; border-color: #38bdf8; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-7xl mx-auto mb-8 border-b border-slate-800 pb-6 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Muñoz Game Vault <span class="text-sky-500 text-sm ml-2 font-mono uppercase">v1.6.1</span></h1>
            <p id="seasonLabel" class="text-emerald-400 text-xs font-bold uppercase tracking-widest mt-1">Temporada: Cargando...</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <section class="lg:col-span-4 space-y-6">
            <div class="card p-6 shadow-2xl">
                <h2 class="text-lg font-semibold mb-6 text-white flex items-center">📝 Nuevo Log de Combate</h2>
                <div class="space-y-4">
                    <div class="relative">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Sistema / Juego</label>
                        <input type="text" id="gameSearch" oninput="filterGames()" placeholder="Buscar o escribir juego nuevo..." autocomplete="off" class="w-full p-3 mt-1 rounded-lg text-sm outline-none focus:border-sky-500">
                        <div id="searchResults" class="hidden absolute z-20 w-full mt-1 max-h-48 overflow-y-auto rounded-lg border border-slate-700 bg-slate-900 shadow-xl"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Ganador</label>
                            <input type="text" id="winner" placeholder="Nombre" class="w-full p-3 mt-1 rounded-lg text-sm outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Puntaje</label>
                            <input type="number" id="score" placeholder="Total" class="w-full p-3 mt-1 rounded-lg text-sm outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2">Submission Margin (Diferencial vs 2do)</label>
                        <input type="number" id="margin" placeholder="¿Por cuánto ganaste?" class="w-full p-3 rounded-lg text-sm outline-none bg-slate-900 border border-slate-700">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2">Oponentes Sometidos</label>
                        <div id="opContainer" class="flex flex-wrap gap-2 mb-3">
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1 rounded-md text-xs text-slate-400 bg-slate-800 border border-slate-700">Jorge</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1 rounded-md text-xs text-slate-400 bg-slate-800 border border-slate-700">Claudia</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1 rounded-md text-xs text-slate-400 bg-slate-800 border border-slate-700">Alan</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1 rounded-md text-xs text-slate-400 bg-slate-800 border border-slate-700">Marisol</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1 rounded-md text-xs text-slate-400 bg-slate-800 border border-slate-700">Ivan</button>
                        </div>
                        <input type="text" id="otherOps" placeholder="Otros oponentes..." class="w-full p-3 rounded-lg text-sm outline-none bg-slate-900 border border-slate-700">
                    </div>

                    <button id="saveBtn" onclick="logGame()" class="w-full btn-primary text-white font-bold py-4 rounded-lg mt-2 shadow-lg uppercase tracking-widest text-xs">Inyectar Victoria</button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6" id="rankingsContainer">
            <div class="col-span-full py-20 text-center text-slate-500 italic">Analizando registros de temporada...</div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwTBSlsPWgNL26KThTrfLXR1YaByMifinJL56uj73I4UB7fdU3KKf9fLIoHWslGoxTb/exec";

        const getSeason = () => {
            const date = new Date();
            const month = date.getMonth(); 
            const year = date.getFullYear();
            const bimonthly = Math.floor(month / 2) + 1;
            const names = ["Ene-Feb", "Mar-Abr", "May-Jun", "Jul-Ago", "Sep-Oct", "Nov-Dic"];
            return { id: `${year}-${bimonthly}`, label: `Temporada ${bimonthly}: ${names[bimonthly-1]} ${year}`, startMonth: Math.floor(month/2)*2 };
        };

        const currentSeason = getSeason();
        document.getElementById('seasonLabel').innerText = currentSeason.label;

        const ALL_GAMES = [
            {n: "Ark Nova", c: "Estrategia"}, {n: "Terraforming Mars", c: "Estrategia"}, {n: "The White Castle", c: "Estrategia"}, 
            {n: "The White Castle: Matcha", c: "Estrategia"}, {n: "Coffee Rush", c: "Estrategia"}, {n: "Mindbug", c: "Duelos"}, 
            {n: "7 Wonders Duel", c: "Duelos"}, {n: "Marvel Dice Throne", c: "Duelos"}, {n: "Trio", c: "Rápidos"}, {n: "Scout", c: "Rápidos"}
            // El buscador permitirá escribir cualquier otro nombre
        ];

        function toggleOp(btn) { btn.classList.toggle('active'); }

        function filterGames() {
            const input = document.getElementById('gameSearch').value.toLowerCase();
            const results = document.getElementById('searchResults');
            if(!input) { results.classList.add('hidden'); return; }
            const filtered = ALL_GAMES.filter(g => g.n.toLowerCase().includes(input));
            results.innerHTML = filtered.map(g => `<div onclick="selectGame('${g.n}')" class="p-3 hover:bg-slate-800 cursor-pointer text-xs border-b border-slate-800 text-white">${g.n} <span class="text-slate-500 italic ml-2">(${g.c})</span></div>`).join('');
            results.classList.remove('hidden');
        }

        function selectGame(name) {
            document.getElementById('gameSearch').value = name;
            document.getElementById('searchResults').classList.add('hidden');
        }

        async function logGame() {
            const btn = document.getElementById('saveBtn');
            const actives = Array.from(document.querySelectorAll('.op-btn.active')).map(b => b.innerText);
            const others = document.getElementById('otherOps').value;
            const opponents = [actives.join(', '), others].filter(x => x).join(', ');

            const data = {
                game: document.getElementById('gameSearch').value,
                winner: document.getElementById('winner').value,
                score: document.getElementById('score').value,
                margin: document.getElementById('margin').value || 0,
                opponents: opponents
            };

            if(!data.game || !data.winner) { alert("Error: Faltan datos."); return; }
            btn.innerText = "INYECTANDO..."; btn.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Victoria registrada.");
                location.reload();
            } catch (e) { alert("Error."); btn.disabled = false; }
        }

        async function loadRankings() {
            const container = document.getElementById('rankingsContainer');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                container.innerHTML = "";

                const stats = { "Estrategia": {}, "Duelos": {}, "Rápidos": {}, "Party": {} };

                data.forEach(entry => {
                    // Filtrar por temporada 2026
                    const date = new Date(entry.timestamp);
                    if(date.getFullYear() !== 2026 || date.getMonth() < currentSeason.startMonth) return;

                    const gameObj = ALL_GAMES.find(g => g.n === entry.juego) || {c: "Estrategia"};
                    const winner = entry.ganador;
                    if(winner) stats[gameObj.c][winner] = (stats[gameObj.c][winner] || 0) + 1;
                });

                Object.keys(stats).forEach(cat => {
                    const players = Object.entries(stats[cat]).sort((a,b) => b[1] - a[1]);
                    container.innerHTML += `
                        <div class="card p-6 shadow-xl border-l-4 border-sky-500">
                            <h2 class="text-sm font-bold text-slate-500 uppercase mb-4 tracking-widest">${cat}</h2>
                            <div class="space-y-4">
                                ${players.map(([name, wins], i) => `
                                    <div class="flex justify-between items-center ${i===0 ? 'bg-sky-500/5 p-2 rounded' : ''}">
                                        <span class="font-bold text-sm ${name.toLowerCase()==='jorge'?'text-sky-400':'text-slate-200'}">${i===0?'👑 ':''}${name}</span>
                                        <span class="font-mono font-bold text-emerald-400 text-sm">${wins} WINS</span>
                                    </div>
                                `).join('') || '<p class="text-xs text-slate-600 italic">Sin actividad.</p>'}
                            </div>
                        </div>
                    `;
                });
            } catch (e) { container.innerHTML = "<p class='text-red-500'>Error de sincronización.</p>"; }
        }
        window.onload = loadRankings;
    </script>
</body>
</html>
