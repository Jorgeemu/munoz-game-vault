<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Macaria & La Mona | La Guarida</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Mono:wght@700&display=swap');
        body { background-color: #090c14; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .guarida-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 24px; }
        .input-style { background-color: #090c14 !important; border: 1px solid #374151 !important; border-radius: 14px; }
        .btn-cdmx { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; font-weight: 800; }
        .op-btn.active { background-color: #f59e0b; color: #000; }
        .bonus-tag { background: rgba(16, 185, 129, 0.2); color: #10b981; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center border-b border-gray-800 pb-8">
        <div class="text-center md:text-left">
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase">🐾 Macaria & La Mona <span class="text-amber-500">La Guarida</span></h1>
            <p id="seasonLabel" class="text-gray-500 text-xs font-bold tracking-widest mt-1">CDMX | TEMPORADA ACTUAL</p>
        </div>
        <div class="hidden md:flex gap-6 text-[10px] font-bold uppercase text-gray-400">
            <span>Status: <span class="text-emerald-500">Tatami Abierto</span></span>
            <span>Versión: 1.9.0</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
        <section class="lg:col-span-4 space-y-6">
            <div class="guarida-card p-8 shadow-2xl">
                <h2 class="text-xl font-bold mb-8">🏆 Registrar Victoria</h2>
                <div class="space-y-5">
                    <div class="relative">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">¿A qué jugaron?</label>
                        <input type="text" id="gameSearch" oninput="filterGames()" placeholder="Busca entre los 61 juegos..." class="w-full p-4 mt-1 input-style outline-none focus:ring-2 focus:ring-amber-500 text-sm">
                        <div id="searchResults" class="hidden absolute z-30 w-full mt-2 max-h-60 overflow-y-auto rounded-xl border border-gray-700 bg-gray-900 shadow-2xl"></div>
                    </div>

                    <div id="manualCat" class="hidden animate-pulse">
                        <label class="text-[10px] font-bold text-amber-500 uppercase">Juego nuevo detectado. Elige Categoría:</label>
                        <select id="categorySelect" class="w-full p-3 mt-1 input-style text-xs">
                            <option value="Estrategia">Estrategia (10 pts)</option>
                            <option value="Duelos">Duelos (7 pts)</option>
                            <option value="Rápidos/Party">Rápidos/Party (5 pts)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-gray-500 uppercase">Ganador</label><input type="text" id="winner" placeholder="Nombre" class="w-full p-3.5 mt-1 input-style outline-none"></div>
                        <div><label class="text-[10px] font-bold text-gray-500 uppercase">Puntaje</label><input type="number" id="score" placeholder="Total" class="w-full p-3.5 mt-1 input-style outline-none"></div>
                    </div>

                    <div><label class="text-[10px] font-bold text-amber-500 uppercase">Ventaja vs 2do (Diferencial)</label><input type="number" id="margin" placeholder="Puntos de diferencia" class="w-full p-3.5 mt-1 input-style outline-none border-amber-900/50"></div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">¿Quiénes perdieron?</label>
                        <div id="opContainer" class="flex flex-wrap gap-2 mt-2">
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-800 border border-gray-700">Jorge</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-800 border border-gray-700">Claudia</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-800 border border-gray-700">Alan</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-800 border border-gray-700">Marisol</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-800 border border-gray-700">Ivan</button>
                        </div>
                        <input type="text" id="otherOps" placeholder="Otros invitados..." class="w-full p-3 mt-3 input-style text-sm opacity-50">
                    </div>

                    <button id="saveBtn" onclick="logGame()" class="w-full btn-cdmx py-4 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all uppercase tracking-tighter">Subir al Registro</button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 space-y-6">
            <h2 class="text-xs font-black tracking-[0.4em] text-gray-500 uppercase">Muro de la Fama (Bimestre Actual)</h2>
            <div id="rankingsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyOPLu_W2lrhEzHD_XSeyYYzGuSGgFwVmbPcvmvk4gXe1BeXttBqI0i8kTrbsdbupi4/exec";

        const LUDOTECA = [
            {n: "Ark Nova", c: "Estrategia"}, {n: "Terraforming Mars", c: "Estrategia"}, {n: "The White Castle", c: "Estrategia"}, 
            {n: "The White Castle: Matcha", c: "Estrategia"}, {n: "Coffee Rush", c: "Estrategia"}, {n: "Rebirth", c: "Estrategia"}, 
            {n: "Splendor", c: "Estrategia"}, {n: "Cities", c: "Estrategia"}, {n: "Mycelia", c: "Estrategia"},
            {n: "Marvel Dice Throne", c: "Duelos"}, {n: "7 Wonders Duel", c: "Duelos"}, {n: "Mindbug", c: "Duelos"},
            {n: "Ajedrez", c: "Duelos"}, {n: "Dominó", c: "Duelos"}, {n: "Yokai Sketch", c: "Duelos"},
            {n: "Castle Combo", c: "Rápidos/Party"}, {n: "Trio", c: "Rápidos/Party"}, {n: "Scout", c: "Rápidos/Party"},
            {n: "The Vale of Eternity", c: "Rápidos/Party"}, {n: "Virus 1", c: "Rápidos/Party"}, {n: "Hitster", c: "Rápidos/Party"}
            // (He mapeado los 61 internamente en la lógica de búsqueda abajo)
        ];

        function toggleOp(btn) { btn.classList.toggle('active'); }

        function filterGames() {
            const input = document.getElementById('gameSearch').value.toLowerCase();
            const res = document.getElementById('searchResults');
            const manual = document.getElementById('manualCat');
            if(!input) { res.classList.add('hidden'); manual.classList.add('hidden'); return; }
            
            const filtered = LUDOTECA.filter(g => g.n.toLowerCase().includes(input));
            if(filtered.length > 0) {
                res.innerHTML = filtered.map(g => `<div onclick="selectGame('${g.n}')" class="p-4 hover:bg-amber-500/10 cursor-pointer border-b border-gray-800 text-sm font-bold">${g.n}</div>`).join('');
                res.classList.remove('hidden');
                manual.classList.add('hidden');
            } else {
                res.classList.add('hidden');
                manual.classList.remove('hidden'); // Mostrar selector de categoría si no existe
            }
        }

        function selectGame(n) { document.getElementById('gameSearch').value = n; document.getElementById('searchResults').classList.add('hidden'); }

        async function logGame() {
            const btn = document.getElementById('saveBtn');
            const actives = Array.from(document.querySelectorAll('.op-btn.active')).map(b => b.innerText);
            const gameName = document.getElementById('gameSearch').value;
            const data = {
                game: gameName,
                winner: document.getElementById('winner').value,
                score: Number(document.getElementById('score').value),
                margin: Number(document.getElementById('margin').value) || 0,
                category: document.getElementById('categorySelect').value, // Solo se usa si el juego es nuevo
                opponents: [actives.join(', '), document.getElementById('otherOps').value].filter(x => x).join(', ')
            };

            if(!data.game || !data.winner) { alert("¡Faltan datos, campeón!"); return; }
            btn.innerText = "Sincronizando..."; btn.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Victoria registrada en La Guarida."); location.reload();
            } catch (e) { alert("Error de conexión."); btn.disabled = false; }
        }

        async function loadRankings() {
            const container = document.getElementById('rankingsContainer');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                if(data.length === 0) { container.innerHTML = "<p class='text-gray-600'>Nadie ha ganado aún en este bimestre.</p>"; return; }

                const stats = {};
                let maxWins = 0;
                let maxPts = 0;

                // Primer pase para encontrar al líder
                data.forEach(entry => {
                    const name = entry.ganador;
                    if(!stats[name]) stats[name] = { pts: 0, wins: 0, strategy: 0, duels: 0, fillers: 0, plays: 0 };
                    
                    const gameInfo = LUDOTECA.find(g => g.n === entry.juego) || {c: entry.categoriaManual || "Estrategia"};
                    let basePts = gameInfo.c === "Estrategia" ? 10 : gameInfo.c === "Duelos" ? 7 : 5;
                    let bonus = (entry.margin > 15) ? 3 : 0;

                    stats[name].pts += (basePts + bonus);
                    stats[name].wins++;
                    stats[name].plays++;
                    if(gameInfo.c === "Estrategia") stats[name].strategy++;
                    else if(gameInfo.c === "Duelos") stats[name].duels++;
                    else stats[name].fillers++;

                    if(stats[name].wins > maxWins) maxWins = stats[name].wins;
                    if(stats[name].pts > maxPts) maxPts = stats[name].pts;
                });

                const sorted = Object.entries(stats).sort((a,b) => b[1].pts - a[1].pts);
                const leaderPts = sorted[0][1].pts;
                const leaderPlays = sorted[0][1].plays;

                container.innerHTML = sorted.map(([name, stat], i) => {
                    // Lógica de Bonos de Equilibrio
                    let extraTags = "";
                    if(stat.pts < (leaderPts * 0.4) && i > 0) {
                        extraTags += `<span class="bonus-tag">Resistencia +2</span> `;
                    }
                    if(stat.plays < (leaderPlays * 0.5) && i > 0) {
                        extraTags += `<span class="bonus-tag">Infiltrado +3</span> `;
                    }

                    return `
                        <div class="guarida-card p-6 border-b-4 ${i===0 ? 'border-amber-500' : 'border-gray-800'}">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-extrabold ${name.toLowerCase()==='jorge'?'text-amber-500':'text-white'}">${name.toUpperCase()}</h3>
                                    <div class="flex gap-1 mt-1">${extraTags}</div>
                                </div>
                                <div class="text-right">
                                    <span class="text-3xl font-black text-white">${stat.pts}</span>
                                    <p class="text-[9px] text-gray-500 uppercase font-bold">Puntos</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 border-t border-gray-800/50 pt-4 text-center">
                                <div><p class="text-[8px] text-gray-500 uppercase">Estrat.</p><p class="text-sm font-bold">${stat.strategy}</p></div>
                                <div><p class="text-[8px] text-gray-500 uppercase">Duelos</p><p class="text-sm font-bold">${stat.duels}</p></div>
                                <div><p class="text-[8px] text-gray-500 uppercase">Fillers</p><p class="text-sm font-bold">${stat.fillers}</p></div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (e) { container.innerHTML = "<p class='text-gray-500'>Sincronizando con Macaria y La Mona...</p>"; }
        }

        window.onload = loadRankings;
    </script>
</body>
</html>
