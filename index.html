<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>La Guarida de Macaria v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #090c14; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .guarida-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 20px; }
        .input-style { background-color: #090c14 !important; border: 1px solid #374151 !important; border-radius: 12px; }
        .accent-amber { color: #f59e0b; }
        .bg-amber { background-color: #f59e0b; color: #000; }
        .op-btn.active { background-color: #f59e0b; color: #000; }
        th { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #1f2937; font-size: 0.85rem; }
        .award-icon { font-size: 1.2rem; margin-right: 8px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-[1600px] mx-auto mb-10 flex flex-col md:flex-row justify-between items-end border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tighter uppercase">🐾 LA GUARIDA DE <span class="accent-amber">MACARIA</span></h1>
            <p id="seasonLabel" class="text-gray-500 text-xs font-bold tracking-[0.3em] mt-2 italic">CDMX | ALPHA KENNEL STATUS</p>
        </div>
        <div class="text-[10px] font-mono text-gray-500">VERSION 2.0.0 // SISTEMA DE MÉRITOS ACTIVO</div>
    </header>

    <main class="max-w-[1600px] mx-auto grid grid-cols-1 xl:grid-cols-12 gap-8">
        
        <section class="xl:col-span-3 space-y-6">
            <div class="guarida-card p-6 shadow-2xl">
                <h2 class="text-lg font-bold mb-6 flex items-center">🏆 Registrar Victoria</h2>
                <div class="space-y-4">
                    <div class="relative">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Juego / Sistema</label>
                        <input type="text" id="gameSearch" oninput="filterGames()" placeholder="Busca tu juego..." class="w-full p-3 mt-1 input-style outline-none focus:ring-1 focus:ring-amber-500 text-sm">
                        <div id="searchResults" class="hidden absolute z-30 w-full mt-2 max-h-60 overflow-y-auto rounded-xl border border-gray-700 bg-gray-900 shadow-2xl"></div>
                    </div>
                    <div id="manualCat" class="hidden p-3 bg-amber/10 rounded-lg border border-amber/20">
                        <label class="text-[9px] font-bold accent-amber uppercase">Categoría para juego nuevo:</label>
                        <select id="categorySelect" class="w-full mt-1 bg-transparent text-xs outline-none">
                            <option value="Estrategia">Estrategia (10 pts)</option>
                            <option value="Duelos">Duelos (7 pts)</option>
                            <option value="Rápidos/Party">Rápidos/Party (5 pts)</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="winner" placeholder="Ganador" class="w-full p-3 input-style outline-none text-sm">
                        <input type="number" id="score" placeholder="Puntaje" class="w-full p-3 input-style outline-none text-sm">
                    </div>
                    <input type="number" id="margin" placeholder="Ventaja vs 2do lugar" class="w-full p-3 input-style outline-none text-sm border-amber-900/30">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Oponentes</label>
                        <div class="flex flex-wrap gap-2 mt-2">
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1.5 rounded-lg text-[10px] font-bold bg-gray-800 border border-gray-700 transition-all">Jorge</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1.5 rounded-lg text-[10px] font-bold bg-gray-800 border border-gray-700 transition-all">Claudia</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1.5 rounded-lg text-[10px] font-bold bg-gray-800 border border-gray-700 transition-all">Alan</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1.5 rounded-lg text-[10px] font-bold bg-gray-800 border border-gray-700 transition-all">Marisol</button>
                            <button onclick="toggleOp(this)" class="op-btn px-3 py-1.5 rounded-lg text-[10px] font-bold bg-gray-800 border border-gray-700 transition-all">Ivan</button>
                        </div>
                        <input type="text" id="otherOps" placeholder="Otros..." class="w-full p-2 mt-2 input-style text-xs opacity-50">
                    </div>
                    <button onclick="logGame()" id="saveBtn" class="w-full bg-amber text-black font-black py-4 rounded-xl mt-2 uppercase tracking-tighter hover:brightness-110 active:scale-95 transition-all">Subir al Registro</button>
                </div>
            </div>
        </section>

        <section class="xl:col-span-9 grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-7 guarida-card p-6 overflow-hidden">
                <h2 class="text-sm font-black tracking-[0.2em] uppercase text-gray-500 mb-6">Ranking de Operativos</h2>
                <table class="w-full">
                    <thead>
                        <tr class="text-left border-b border-gray-800">
                            <th>Pos</th>
                            <th>Jugador</th>
                            <th class="text-center">Vics</th>
                            <th class="text-right">Puntos</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody">
                        </tbody>
                </table>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <div class="guarida-card p-6">
                    <h2 class="text-sm font-black tracking-[0.2em] uppercase text-gray-500 mb-6">Méritos de Temporada</h2>
                    <div id="meritsBody" class="space-y-4 text-sm">
                        </div>
                </div>

                <div class="guarida-card p-6">
                    <h2 class="text-sm font-black tracking-[0.2em] uppercase text-gray-500 mb-6">Sistemas más utilizados</h2>
                    <div id="topGamesBody" class="space-y-3">
                        </div>
                </div>
            </div>

        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz3XKF8OZ0HdExHlLt8GepMZC4pJTuGTpkOUk0K-ZiSt5xbsScYrFEjPdgqkUbRXTxt/exec";

        const LUDOTECA = [
            {n: "Ark Nova", c: "Estrategia"}, {n: "Terraforming Mars", c: "Estrategia"}, {n: "The White Castle", c: "Estrategia"},
            {n: "The White Castle: Matcha", c: "Estrategia"}, {n: "Coffee Rush", c: "Estrategia"}, {n: "Rebirth", c: "Estrategia"},
            {n: "Marvel Dice Throne", c: "Duelos"}, {n: "7 Wonders Duel", c: "Duelos"}, {n: "Mindbug", c: "Duelos"},
            {n: "Castle Combo", c: "Rápidos/Party"}, {n: "Trio", c: "Rápidos/Party"}, {n: "Scout", c: "Rápidos/Party"},
            {n: "The Vale of Eternity", c: "Rápidos/Party"}, {n: "Virus 1", c: "Rápidos/Party"}, {n: "Hot Streak", c: "Rápidos/Party"},
            {n: "Dragones del Mar", c: "Estrategia"}, {n: "Sushi Go", c: "Rápidos/Party"}, {n: "Exploding Kittens", c: "Rápidos/Party"}
        ];

        function toggleOp(btn) { btn.classList.toggle('active'); }

        function filterGames() {
            const input = document.getElementById('gameSearch').value.toLowerCase();
            const res = document.getElementById('searchResults');
            const manual = document.getElementById('manualCat');
            if(!input) { res.classList.add('hidden'); manual.classList.add('hidden'); return; }
            const filtered = LUDOTECA.filter(g => g.n.toLowerCase().includes(input));
            if(filtered.length > 0) {
                res.innerHTML = filtered.map(g => `<div onclick="selectGame('${g.n}')" class="p-4 hover:bg-amber-500/10 cursor-pointer border-b border-gray-800 text-xs font-bold">${g.n}</div>`).join('');
                res.classList.remove('hidden'); manual.classList.add('hidden');
            } else { res.classList.add('hidden'); manual.classList.remove('hidden'); }
        }

        function selectGame(n) { document.getElementById('gameSearch').value = n; document.getElementById('searchResults').classList.add('hidden'); }
