<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Muñoz | Game Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { 
            background-color: #0f172a; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
        }
        .card { 
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
        }
        input, select {
            background-color: #0f172a !important;
            border: 1px solid #475569 !important;
            color: #f1f5f9 !important;
        }
        input:focus, select:focus {
            border-color: #38bdf8 !important;
            outline: none;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="max-w-5xl mx-auto mb-10 border-b border-slate-700 pb-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-sky-400">Game Tracker</h1>
            <p class="text-sm text-slate-400">Registro de victorias y ranking personal</p>
        </div>
        <div class="text-right">
            <span class="text-xs font-mono text-slate-500 uppercase">Versión 1.2.0</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1 card p-6 shadow-xl">
            <h2 class="text-lg font-bold mb-6 text-white flex items-center">
                📝 Registrar Partida
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 uppercase font-semibold">Juego</label>
                    <select id="gameSelect" class="w-full p-2.5 mt-1 rounded">
                        <optgroup label="Euros / Estrategia">
                            <option>Ark Nova</option>
                            <option>The White Castle</option>
                            <option>Terraforming Mars</option>
                            <option>Rebirth</option>
                        </optgroup>
                        <optgroup label="Duelos 1v1">
                            <option>Marvel Dice Throne</option>
                            <option>Mindbug</option>
                            <option>7 Wonders Duel</option>
                            <option>Ajedrez</option>
                        </optgroup>
                        <optgroup label="Rápidos / Fillers">
                            <option>Castle Combo</option>
                            <option>Scout</option>
                            <option>Trio</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="text-xs text-slate-400 uppercase font-semibold">Ganador</label>
                    <input type="text" id="winner" placeholder="Nombre del ganador" class="w-full p-2.5 mt-1 rounded text-sm">
                </div>

                <div>
                    <label class="text-xs text-slate-400 uppercase font-semibold">Puntaje Final</label>
                    <input type="number" id="score" placeholder="Puntos obtenidos" class="w-full p-2.5 mt-1 rounded text-sm">
                </div>

                <div>
                    <label class="text-xs text-slate-400 uppercase font-semibold">Oponentes</label>
                    <input type="text" id="opponents" placeholder="Claudia, Alan, etc." class="w-full p-2.5 mt-1 rounded text-sm">
                </div>

                <button onclick="logGame(this)" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 px-4 rounded transition-colors mt-2">
                    Guardar Resultado
                </button>
            </div>
        </section>

        <section class="lg:col-span-2 card p-6 shadow-xl">
            <h2 class="text-lg font-bold mb-6 text-white flex items-center">
                🏆 Tabla de Posiciones
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-[11px] uppercase tracking-wider border-b border-slate-700">
                            <th class="pb-3">Posición</th>
                            <th class="pb-3">Jugador</th>
                            <th class="pb-3 text-center">Victorias</th>
                            <th class="pb-3 text-right">Puntos (ELO)</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody">
                        <tr>
                            <td colspan="4" class="py-10 text-center text-slate-500 text-sm italic">Cargando datos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="max-w-5xl mx-auto mt-16 text-[11px] text-slate-500 flex justify-between border-t border-slate-800 pt-6">
        <span>© 2026 Muñoz Game Architect</span>
        <span class="font-mono">Status: Connected to Google Sheets</span>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxVD-Xsflhp_q-cdFOcXjqWN2So-zwOpwPfPRLKFCRsNJeN6eW0wvOEYGOg_152jNHj/exec";

        async function logGame(btn) {
            const winner = document.getElementById('winner').value;
            const score = document.getElementById('score').value;
            const game = document.getElementById('gameSelect').value;
            const opponents = document.getElementById('opponents').value;

            if(!winner || !score || !opponents) {
                alert("Por favor completa todos los campos (Ganador, Puntaje y Oponentes).");
                return;
            }

            btn.innerText = "Guardando...";
            btn.disabled = true;

            const data = {
                game: game,
                winner: winner,
                score: score,
                opponents: opponents
            };

            try {
                // El modo 'no-cors' envía los datos aunque no reciba respuesta confirmada del navegador
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                alert("Resultado registrado correctamente.");
                location.reload();
            } catch (error) {
                console.error("Error:", error);
                alert("Hubo un error al conectar con el servidor.");
            } finally {
                btn.innerText = "Guardar Resultado";
                btn.disabled = false;
            }
        }

        async function loadRankings() {
            const tbody = document.getElementById('rankingBody');
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if(!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-slate-600 text-sm">No hay partidas registradas aún.</td></tr>';
                    return;
                }

                const stats = {};
                data.forEach(row => {
                    const player = row[2]; // Ganador está en la columna C (índice 2)
                    if(player) stats[player] = (stats[player] || 0) + 1;
                });

                const sortedPlayers = Object.entries(stats).sort((a, b) => b[1] - a[1]);

                tbody.innerHTML = sortedPlayers.map(([player, wins], index) => {
                    const isJorge = player.toLowerCase() === 'jorge';
                    const elo = 1000 + (wins * 50);
                    return `
                        <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                            <td class="py-4 font-mono text-slate-500">#${index + 1}</td>
                            <td class="py-4">
                                <span class="font-bold ${isJorge ? 'text-sky-400' : 'text-slate-200'}">
                                    ${player}
                                </span>
                            </td>
                            <td class="py-4 text-center font-bold text-emerald-400">${wins}</td>
                            <td class="py-4 text-right font-mono text-slate-400">${elo}</td>
                        </tr>
                    `;
                }).join('');

            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-red-400 text-sm uppercase">Error de conexión con el Ranking.</td></tr>';
            }
        }

        window.onload = loadRankings;
    </script>
</body>
</html>
