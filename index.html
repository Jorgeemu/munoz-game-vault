<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Muñoz | Hall of Fame</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .crown-card { border: 1px solid #eab308; background: linear-gradient(145deg, #1e293b 0%, #161e2e 100%); }
        input, select { background-color: #0f172a !important; border: 1px solid #475569 !important; color: #f1f5f9 !important; }
        .btn-primary { background-color: #0284c7; transition: all 0.2s; cursor: pointer; }
        .btn-primary:hover { background-color: #0ea5e9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-7xl mx-auto mb-10 border-b border-slate-800 pb-8">
        <h1 class="text-3xl font-bold text-white tracking-tight">Muñoz Game Vault <span class="text-yellow-500 text-lg ml-2">v1.4.0</span></h1>
        <p class="text-slate-400 mt-1">Arquitecto: J. Muñoz | Registro de Realeza del Tablero</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <section class="lg:col-span-4 space-y-6">
            <div class="card p-6 shadow-2xl h-fit">
                <h2 class="text-lg font-semibold mb-6 flex items-center text-white">
                    <span class="mr-2">📝</span> Registrar Victoria
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Juego</label>
                        <select id="gameSelect" class="w-full p-3 mt-1 rounded-lg text-sm">
                            <optgroup label="Estrategia / Euros">
                                <option>Ark Nova</option><option>Terraforming Mars</option><option>The White Castle</option>
                                <option>The White Castle: Matcha</option><option>Coffee Rush</option><option>Rebirth</option>
                                <option>Splendor</option><option>Cities</option><option>Mycelia</option>
                            </optgroup>
                            <optgroup label="Duelos 1v1">
                                <option>Marvel Dice Throne</option><option>7 Wonders Duel</option><option>Mindbug</option>
                                <option>Yokai Sketch</option><option>Ajedrez</option><option>Dominó</option>
                                <option>Stratego</option><option>King of Tokyo Duel</option><option>Catan Viajeros Duel</option>
                            </optgroup>
                            <optgroup label="Rápidos / Fillers">
                                <option>Castle Combo</option><option>Trio</option><option>Scout</option>
                                <option>The Vale of Eternity</option><option>Catfe</option><option>Sushi Go</option>
                                <option>Draftosaurus</option><option>Hot Streak</option><option>Ouch!</option>
                            </optgroup>
                            <optgroup label="Party / Habilidad">
                                <option>Hitster</option><option>Virus 1</option><option>Virus 2</option>
                                <option>Taco Gato...</option><option>Fantasma Blitz</option><option>Exploding Kittens</option>
                                <option>Código Secreto</option><option>Wanted</option><option>That’s not a hat</option>
                                <option>Dixit</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-400 uppercase">Ganador</label>
                        <input type="text" id="winner" placeholder="Nombre" class="w-full p-3 mt-1 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-400 uppercase">Puntaje</label>
                        <input type="number" id="score" placeholder="Puntos" class="w-full p-3 mt-1 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-400 uppercase">Oponentes</label>
                        <input type="text" id="opponents" placeholder="Ej: Claudia, Alan" class="w-full p-3 mt-1 rounded-lg text-sm">
                    </div>
                    <button id="saveBtn" onclick="logGame()" class="w-full btn-primary text-white font-bold py-4 rounded-lg mt-2 shadow-lg">
                        Inyectar Log
                    </button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6" id="rankingsContainer">
            <div class="col-span-full py-20 text-center text-slate-500 animate-pulse">Sincronizando con el Registro Central...</div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz3XKF8OZ0HdExHlLt8GepMZC4pJTuGTpkOUk0K-ZiSt5xbsScYrFEjPdgqkUbRXTxt/exec";

        // Mapeo Táctico de Juegos por Categoría
        const CATEGORIES = {
            "Estrategia": ["Ark Nova", "Terraforming Mars", "The White Castle", "The White Castle: Matcha", "Coffee Rush", "Rebirth", "Splendor", "Cities", "Mycelia", "Catan Plus", "Catan: GOT", "Nemesis (Modo Competitivo)", "Dragones del Mar", "Risk"],
            "Duelos": ["Marvel Dice Throne", "7 Wonders Duel", "Mindbug", "Yokai Sketch", "Ajedrez", "Dominó", "Stratego", "King of Tokyo Duel", "Catan Viajeros Duel"],
            "Rápidos": ["Castle Combo", "Trio", "Scout", "The Vale of Eternity", "Catfe", "Sushi Go", "Sushi Go: Dim Sum", "Draftosaurus", "Hot Streak", "Ouch!"],
            "Party": ["Hitster", "Suspend", "Polilla Tramposa", "Virus 1", "Virus 2", "Taco Gato...", "Fantasma Blitz", "Throw Throw Burrito", "Exploding Kittens", "Tetris", "Basta", "Uno", "Código Secreto", "Little Secret", "Wanted", "That’s not a hat", "Dixit", "Reyes de la Rosca", "Pokémon Babanuki"]
        };

        const TITLES = {
            "Estrategia": "👑 Rey/Reina de la Estrategia",
            "Duelos": "⚔️ Monarca de Duelos",
            "Rápidos": "⚡ Velocista del Tablero",
            "Party": "🥳 Master del Caos"
        };

        async function logGame() {
            const btn = document.getElementById('saveBtn');
            const data = {
                game: document.getElementById('gameSelect').value,
                winner: document.getElementById('winner').value,
                score: document.getElementById('score').value,
                opponents: document.getElementById('opponents').value
            };

            if(!data.winner || !data.score) { alert("Datos incompletos."); return; }
            btn.innerText = "Guardando..."; btn.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Victoria registrada.");
                location.reload();
            } catch (e) { alert("Error."); btn.disabled = false; }
        }

        async function loadRankings() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('rankingsContainer');
                container.innerHTML = "";

                if(!data || data.length === 0) {
                    container.innerHTML = "<p class='col-span-full text-center py-10'>No hay registros aún.</p>";
                    return;
                }

                // Agrupar victorias por categoría y jugador
                const categoryStats = { "Estrategia": {}, "Duelos": {}, "Rápidos": {}, "Party": {} };

                data.forEach(entry => {
                    const game = entry.juego;
                    const winner = entry.ganador;
                    
                    for (const [cat, games] in CATEGORIES) {
                        if (games.includes(game)) {
                            categoryStats[cat][winner] = (categoryStats[cat][winner] || 0) + 1;
                        }
                    }
                });

                // Renderizar cada ranking
                for (const cat in categoryStats) {
                    const players = Object.entries(categoryStats[cat]).sort((a,b) => b[1] - a[1]);
                    const topPlayer = players[0] ? players[0][0] : "Sin Rey";
                    
                    container.innerHTML += `
                        <div class="card p-5 shadow-lg border-t-4 ${players[0] ? 'border-yellow-500' : 'border-slate-700'}">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-tighter mb-1">${cat}</h3>
                            <h2 class="text-lg font-bold text-white mb-
