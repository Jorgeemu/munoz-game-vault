<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Arya & Mona | Battle Vault</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Mono:wght@700&display=swap');
        body { background-color: #0c0f16; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .kennel-card { background-color: #171c2c; border: 1px solid #2d364d; border-radius: 20px; transition: 0.3s; }
        .input-style { background-color: #0c0f16 !important; border: 1px solid #334155 !important; border-radius: 12px; }
        .btn-gold { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); color: #000; font-weight: 800; }
        .op-btn.active { background-color: #eab308; color: #000; border-color: #fde047; }
        .tag { font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="max-w-7xl mx-auto mb-10 border-b border-slate-800 pb-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-center md:text-left">
            <h1 class="text-3xl font-extrabold tracking-tighter">🐾 ARYA & MONA <span class="text-yellow-500">BATTLE VAULT</span></h1>
            <p id="seasonLabel" class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1 italic">Temporada en curso</p>
        </div>
        <div class="flex gap-4">
            <div class="text-center px-4 border-r border-slate-800"><p class="text-[10px] text-slate-500 uppercase">Status</p><p class="text-xs font-bold text-emerald-400">Torneo Activo</p></div>
            <div class="text-center px-4"><p class="text-[10px] text-slate-500 uppercase">Versión</p><p class="text-xs font-bold">1.8.0 Stable</p></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <section class="lg:col-span-4 space-y-6">
            <div class="kennel-card p-8 shadow-2xl">
                <h2 class="text-xl font-bold mb-8 flex items-center">🏆 Subir Resultado</h2>
                
                <div class="space-y-5">
                    <div class="relative">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">¿Qué jugaron?</label>
                        <input type="text" id="gameSearch" oninput="filterGames()" placeholder="Buscar juego..." class="w-full p-3.5 mt-1 input-style outline-none focus:ring-2 focus:ring-yellow-500">
                        <div id="searchResults" class="hidden absolute z-30 w-full mt-2 max-h-60 overflow-y-auto rounded-xl border border-slate-700 bg-slate-900 shadow-2xl"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Ganador</label>
                            <input type="text" id="winner" placeholder="Nombre" class="w-full p-3.5 mt-1 input-style outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Su Puntaje</label>
                            <input type="number" id="score" placeholder="Total" class="w-full p-3.5 mt-1 input-style outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-yellow-500 uppercase ml-1">Diferencia vs 2do (Ventaja)</label>
                        <input type="number" id="margin" placeholder="¿Por cuántos puntos ganó?" class="w-full p-3.5 mt-1 input-style outline-none border-yellow-500/30">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">¿A quiénes derrotó?</label>
                        <div id="opContainer" class="flex flex-wrap gap-2 mt-2">
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-lg text-xs font-bold text-slate-400 bg-slate-800 border border-slate-700 transition-all">Jorge</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-lg text-xs font-bold text-slate-400 bg-slate-800 border border-slate-700 transition-all">Claudia</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-lg text-xs font-bold text-slate-400 bg-slate-800 border border-slate-700 transition-all">Alan</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-lg text-xs font-bold text-slate-400 bg-slate-800 border border-slate-700 transition-all">Marisol</button>
                            <button onclick="toggleOp(this)" class="op-btn px-4 py-2 rounded-lg text-xs font-bold text-slate-400 bg-slate-800 border border-slate-700 transition-all">Ivan</button>
                        </div>
                        <input type="text" id="otherOps" placeholder="Otros jugadores..." class="w-full p-3 mt-3 input-style opacity-60 text-sm">
                    </div>

                    <button id="saveBtn" onclick="logGame()" class="w-full btn-gold py-4 rounded-xl mt-4 shadow-lg hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-tighter">Guardar Partida</button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 space-y-6">
            <h2 class="text-slate-500 text-xs font-black tracking-[0.3em] uppercase mb-4">Muro de la Fama (Temporada Actual)</h2>
            <div id="rankingsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwMY6_3G9qxnugtPipcsWRJmx1qGfbfeRHkMEHMGZU_jQEGxERp6vqEHN2LNjvoWckq/exec";

        const ALL_GAMES = [
            {n: "Ark Nova", c: "Estrategia"}, {n: "Terraforming Mars", c: "Estrategia"}, {n: "The White Castle", c: "Estrategia"}, 
            {n: "Marvel Dice Throne", c: "Duelos"}, {n: "7 Wonders Duel", c: "Duelos"}, {n: "Mindbug", c: "Duelos"}, 
            {n: "Castle Combo", c: "Rápidos"}, {n: "Trio", c: "Rápidos"}, {n: "Scout", c: "Rápidos"}, 
            {n: "The Vale of Eternity", c: "Rápidos"}, {n: "Hitster", c: "Party"}, {n: "Virus 1", c: "Party"},
            {n: "Hot Streak", c: "Rápidos"}, {n: "Dragones del Mar", c: "Estrategia"}, {n: "Coffee Rush", c: "Estrategia"}
        ];

        const date = new Date();
        const bimonthlyIdx = Math.floor(date.getMonth() / 2);
        document.getElementById('seasonLabel').innerText = `T2: Mar-Abr ${date.getFullYear()} | Kennel Status: Alpha`;

        function toggleOp(btn) { btn.classList.toggle('active'); }

        function filterGames() {
            const input = document.getElementById('gameSearch').value.toLowerCase();
            const res = document.getElementById('searchResults');
            if(!input) { res.classList.add('hidden'); return; }
            const filtered = ALL_GAMES.filter(g => g.n.toLowerCase().includes(input));
            res.innerHTML = filtered.map(g => `<div onclick="selectGame('${g.n}')" class="p-4 hover:bg-yellow-500/10 cursor-pointer border-b border-slate-800 text-sm font-bold">${g.n} <span class="text-[9px] text-slate-500 uppercase ml-2">${g.c}</span></div>`).join('');
            res.classList.remove('hidden');
        }

        function selectGame(n) { document.getElementById('gameSearch').value = n; document.getElementById('searchResults').classList.add('hidden'); }

        async function logGame() {
            const btn = document.getElementById('saveBtn');
            const actives = Array.from(document.querySelectorAll('.op-btn.active')).map(b => b.innerText);
            const data = {
                game: document.getElementById('gameSearch').value,
                winner: document.getElementById('winner').value,
                score: Number(document.getElementById('score').value),
                margin: Number(document.getElementById('margin').value) || 0,
                opponents: [actives.join(', '), document.getElementById('otherOps').value].filter(x => x).join(', ')
            };

            if(!data.game || !data.winner) { alert("Completa los datos, Jorge."); return; }
            btn.innerText = "Sincronizando..."; btn.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Victoria guardada. Arya y Mona aprueban."); location.reload();
            } catch (e) { alert("Error de conexión."); btn.disabled = false; }
        }

        async function loadRankings() {
            const container = document.getElementById('rankingsContainer');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                container.innerHTML = "";

                const playerStats = {};

                data.forEach(entry => {
                    const d = new Date(entry.timestamp);
                    if(d.getMonth() < bimonthlyIdx * 2) return;

                    const name = entry.ganador;
                    const gameObj = ALL_GAMES.find(g => g.n === entry.juego) || {c: "Estrategia"};
                    let pts = gameObj.c === "Estrategia" ? 10 : gameObj.c === "Duelos" ? 7 : 5;
                    
                    const margin = Number(entry.margin) || 0;
                    // Fix: Si la ventaja es > 15 o > 20% del score, es Gran Victoria
                    const bonus = (margin > 15 || margin > (Number(entry.score) * 0.2)) ? 3 : 0;

                    if(!playerStats[name]) playerStats[name] = { pts: 0, wins: 0, bigWins: 0, cat: { "Estrategia": 0, "Duelos": 0, "Rápidos/Party": 0 } };
                    
                    playerStats[name].pts += (pts + bonus);
                    playerStats[name].wins++;
                    if(bonus > 0) playerStats[name].bigWins++;
                    
                    const catKey = gameObj.c === "Estrategia" ? "Estrategia" : gameObj.c === "Duelos" ? "Duelos" : "Rápidos/Party";
                    playerStats[name].cat[catKey]++;
                });

                const sorted = Object.entries(playerStats).sort((a,b) => b[1].pts - a[1].pts);

                container.innerHTML = sorted.map(([name, stat], i) => `
                    <div class="kennel-card p-6 border-t-4 ${i===0 ? 'border-yellow-500' : 'border-slate-700'}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-extrabold text-white">${name.toUpperCase()}</h3>
                                <div class="flex gap-2 mt-1">
                                    ${stat.bigWins > 0 ? `<span class="tag bg-yellow-500 text-black">Palizas: ${stat.bigWins}</span>` : ''}
                                    ${i === 0 ? `<span class="tag bg-emerald-500 text-black">Líder</span>` : ''}
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-3xl font-black text-white">${stat.pts}</span>
                                <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Puntos Totales</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 border-t border-slate-800/50 pt-4">
                            <div class="text-center">
                                <p class="text-[8px] text-slate-500 uppercase">Estrat.</p>
                                <p class="text-sm font-bold">${stat.cat["Estrategia"]}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[8px] text-slate-500 uppercase">Duelos</p>
                                <p class="text-sm font-bold">${stat.cat["Duelos"]}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[8px] text-slate-500 uppercase">Fillers</p>
                                <p class="text-sm font-bold">${stat.cat["Rápidos/Party"]}</p>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (e) { container.innerHTML = "<p class='text-slate-500'>Sincronizando con el Kennel...</p>"; }
        }

        window.onload = loadRankings;
    </script>
</body>
</html>
